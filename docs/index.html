<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RatCalc — Exact rational arithmetic calculator with interval support powered by RiX." />
    <title>RatCalc — powered by RiX</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <a class="brand" href="./" aria-label="RatCalc home"><span class="rm-mark">R/M</span><span><b>RatCalc</b><small>powered by RiX</small></span></a>
        <p>Exact rational arithmetic calculator with interval support powered by RiX</p>
        <nav aria-label="RatCalc navigation"><a href="./learn/getting-started.html">Tutorials</a><button type="button" data-action="help">Help</button></nav>
      </header>

      <section class="calculator" aria-label="RatCalc calculator">
        <div class="calculator-toolbar">
          <span><i></i> RiX browser session</span>
          <span id="entry-mode-label">Command mode · Enter runs</span>
        </div>
        <div id="output-history" class="output-history" aria-live="polite"></div>
        <div id="input-section" class="input-section">
          <span class="prompt">&gt;</span>
          <label class="sr-only" for="calculator-input">RatCalc command entry</label>
          <textarea id="calculator-input" class="calculator-input" rows="1" spellcheck="false" placeholder="Enter a RiX expression — .help for help"></textarea>
          <button class="run-button" type="button" data-action="run">Run</button>
        </div>
        <p id="script-note" class="script-note" hidden>Script mode: Enter adds a line; Ctrl/⌘ + Enter runs the script.</p>
      </section>

      <div class="controls" aria-label="Calculator controls">
        <button type="button" data-action="copy">Copy session</button>
        <button type="button" data-action="help">? Help</button>
        <button id="script-toggle" type="button" data-action="script">Script entry: off</button>
        <button type="button" data-action="load">Load</button>
        <button type="button" data-action="clear">Clear</button>
        <input id="file-input" type="file" accept=".rix,.js,text/plain,application/javascript" hidden />
      </div>
    </main>

    <dialog id="help-dialog" class="help-dialog" aria-labelledby="help-title">
      <header class="modal-header"><div><h2 id="help-title">RatCalc help</h2><p>Start with exact values. Keep going with RiX.</p></div><button type="button" data-action="close-help" aria-label="Close help">×</button></header>
      <div class="modal-body">
        <label class="sr-only" for="help-search">Search RatCalc help</label>
        <input id="help-search" class="help-search" type="search" placeholder="Search syntax, intervals, assignments…" />
        <div id="help-content"></div>
      </div>
    </dialog>
    <script type="module" src="./assets/main.js"></script>
  </body>
</html>
